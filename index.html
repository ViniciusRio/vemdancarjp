<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forró JP — Agenda Pé de Serra em João Pessoa</title>
  <meta name="description" content="Agenda fixa semanal de Forró Pé de Serra em João Pessoa, PB. Saiba onde dançar cada dia da semana." />
  <meta property="og:title" content="Forró JP — Agenda Pé de Serra em João Pessoa" />
  <meta property="og:description" content="Saiba onde dançar forró pé de serra em JP hoje." />
  <meta name="theme-color" content="#1a0f05" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #1a0f05;
      --bg2:       #221408;
      --bg3:       #2d1a06;
      --border:    #3d2410;
      --border2:   #4a2e12;
      --accent:    #c97b2e;
      --accent2:   #e8952e;
      --text:      #f5ede0;
      --text2:     #a07858;
      --text3:     #7a5a3a;
      --text4:     #5a3a1a;
      --text5:     #4a2e12;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      padding: 3rem 1.5rem 2rem;
      border-bottom: 1px solid var(--border);
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 320px; height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,123,46,0.12) 0%, transparent 65%);
      pointer-events: none;
    }

    .hero::after {
      content: '';
      position: absolute;
      bottom: -80px; left: -40px;
      width: 220px; height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,123,46,0.07) 0%, transparent 65%);
      pointer-events: none;
    }

    .hero-tag {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 0.6rem;
    }

    .hero-title {
      font-family: 'Fraunces', serif;
      font-size: clamp(32px, 8vw, 52px);
      font-weight: 600;
      line-height: 1.1;
      color: var(--text);
      margin-bottom: 0.4rem;
    }

    .hero-title em {
      font-style: italic;
      color: var(--accent);
    }

    .hero-sub {
      font-size: 14px;
      color: var(--text3);
      margin-bottom: 1.5rem;
    }

    .today-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 20px;
      font-size: 13px;
      color: var(--text2);
    }

    .today-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── FILTERS ── */
    .filters-wrap {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(26,15,5,0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 0;
    }

    .filters {
      display: flex;
      gap: 8px;
      padding: 0 1.5rem;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .filters::-webkit-scrollbar { display: none; }

    .filter-btn {
      flex-shrink: 0;
      padding: 7px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text3);
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s ease;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
      font-weight: 500;
    }

    .filter-btn.today-filter {
      border-color: var(--border2);
      color: var(--accent);
    }

    .filter-btn.today-filter.active {
      background: var(--accent);
      color: var(--bg);
    }

    /* ── CONTENT ── */
    .content { padding: 0 1.5rem 2rem; }

    /* ── DAY SECTION ── */
    .day-section { margin-top: 2rem; }

    .day-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1rem;
    }

    .day-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    .day-label {
      font-family: 'Fraunces', serif;
      font-size: 18px;
      font-weight: 400;
      font-style: italic;
      color: var(--text);
    }

    .day-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .day-count {
      font-size: 11px;
      color: var(--text4);
    }

    /* ── EVENT CARD ── */
    .event-card {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 0.9rem 1rem;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 8px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      cursor: pointer;
    }

    .event-card:hover {
      border-color: var(--accent);
      background: rgba(44,26,8,0.9);
      transform: translateY(-1px);
    }

    .event-card.no-link { cursor: default; }
    .event-card.no-link:hover { transform: none; }

    .event-card.highlight-today {
      border-color: var(--border2);
      background: rgba(44,26,8,0.6);
    }

    .event-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: var(--bg3);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 18px;
    }

    .event-info { flex: 1; min-width: 0; }

    .event-name {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 3px;
    }

    .event-meta {
      font-size: 12px;
      color: var(--text3);
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .event-meta-sep { color: var(--text5); }

    .event-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      flex-shrink: 0;
    }

    .event-badge {
      font-size: 10px;
      padding: 3px 9px;
      border-radius: 10px;
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--accent);
      white-space: nowrap;
    }

    .event-ig-link {
      font-size: 11px;
      color: var(--text4);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .event-ig-link svg { opacity: 0.6; }

    .empty-day {
      font-size: 14px;
      color: var(--text5);
      font-style: italic;
      padding: 0.5rem 0.25rem;
    }

    /* ── OBS SECTION ── */
    .obs-section {
      margin-top: 2.5rem;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 12px;
      overflow: hidden;
    }

    .obs-header {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .obs-header-icon {
      font-size: 14px;
    }

    .obs-header-text {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text3);
      font-weight: 500;
    }

    .obs-item {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .obs-item:last-child { border-bottom: none; }

    .obs-name { font-size: 14px; color: var(--text2); }
    .obs-bairro { font-size: 12px; color: var(--text4); margin-top: 1px; }

    .obs-days {
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 10px;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text4);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── OUTROS SECTION ── */
    .outros-section { margin-top: 2rem; }

    .outros-title {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text4);
      font-weight: 500;
      margin-bottom: 0.75rem;
    }

    .outros-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .outros-chip {
      display: inline-block;
      padding: 6px 13px;
      border-radius: 20px;
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text3);
      font-size: 12px;
      transition: border-color 0.15s, color 0.15s;
    }

    .outros-chip:hover {
      border-color: var(--border2);
      color: var(--text2);
    }

    .outros-chip span {
      color: var(--text5);
      font-size: 11px;
    }

    /* ── FOOTER ── */
    .footer {
      margin-top: 3rem;
      padding: 1.5rem 1.5rem;
      border-top: 1px solid var(--border);
      text-align: center;
    }

    .footer-text {
      font-size: 12px;
      color: var(--text5);
      line-height: 1.7;
    }

    .footer-text a {
      color: var(--text4);
      text-decoration: none;
    }

    /* ── LOADING ── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      color: var(--text4);
      font-size: 14px;
      font-style: italic;
    }

    /* ── DESKTOP ── */
    @media (min-width: 700px) {
      .hero { padding: 4rem 2.5rem 2.5rem; }
      .content { padding: 0 2.5rem 3rem; max-width: 740px; margin: 0 auto; }
      .filters { padding: 0 2.5rem; }
      .footer { padding: 2rem 2.5rem; }
    }
  </style>
</head>
<body>
<script>
  var hash = window.location.hash;
  if (hash && (hash.indexOf('invite_token') !== -1 || hash.indexOf('recovery_token') !== -1)) {
    window.location.replace('/admin/' + hash);
  }
</script>
  <header class="hero">
    <p class="hero-tag">João Pessoa · PB</p>
    <h1 class="hero-title">Forró <em>JP</em></h1>
    <p class="hero-sub" id="hero-sub">Agenda fixa semanal de Pé de Serra</p>
    <div class="today-badge">
      <div class="today-dot"></div>
      <span id="today-label">carregando...</span>
    </div>
  </header>

  <div class="filters-wrap">
    <div class="filters" id="filters">
      <button class="filter-btn active" data-day="all">Todos os dias</button>
      <button class="filter-btn today-filter" data-day="today">Hoje</button>
    </div>
  </div>

  <main class="content" id="main-content">
    <div class="loading">carregando agenda...</div>
  </main>

  <footer class="footer">
    <p class="footer-text">
      Agenda mantida pela comunidade de forró de João Pessoa.<br>
      Atualizado em <span id="last-update">—</span>.
    </p>
  </footer>

  <script>
    const DIAS_SEMANA = ['domingo','segunda','terca','quarta','quinta','sexta','sabado'];
    const DIAS_LABELS = {
      domingo: 'Domingo',
      segunda: 'Segunda-feira',
      terca: 'Terça-feira',
      quarta: 'Quarta-feira',
      quinta: 'Quinta-feira',
      sexta: 'Sexta-feira',
      sabado: 'Sábado'
    };

    const ICONS = {
      default: '🎵',
      pratica: '🕺',
      gravacao: '🎙️',
      forro: '🪗',
      projeto: '🎶'
    };

    function getIcon(nome) {
      const n = nome.toLowerCase();
      if (n.includes('prática') || n.includes('pratica')) return ICONS.pratica;
      if (n.includes('gravação') || n.includes('gravacao')) return ICONS.gravacao;
      if (n.includes('projeto')) return ICONS.projeto;
      if (n.includes('forró') || n.includes('forro')) return ICONS.forro;
      return ICONS.default;
    }

    function getTodayId() {
      const d = new Date();
      return DIAS_SEMANA[d.getDay()];
    }

    function formatDate(iso) {
      if (!iso) return '—';
      const [y, m, day] = iso.split('-');
      return `${day}/${m}/${y}`;
    }

    function buildFilters(dias) {
      const wrap = document.getElementById('filters');
      // remove existing day buttons
      wrap.querySelectorAll('[data-day]:not([data-day="all"]):not([data-day="today"])').forEach(b => b.remove());

      const todayId = getTodayId();
      dias.forEach(d => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.dataset.day = d.id;
        btn.textContent = d.label.split('-')[0]; // "Segunda" de "Segunda-feira"
        if (d.id === todayId) btn.classList.add('today-filter');
        wrap.appendChild(btn);
      });

      // filter interaction
      wrap.addEventListener('click', e => {
        if (!e.target.matches('.filter-btn')) return;
        wrap.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        const day = e.target.dataset.day;
        renderContent(window._agenda, day === 'today' ? getTodayId() : day);
      });
    }

    function renderContent(agenda, filter) {
      const container = document.getElementById('main-content');
      container.innerHTML = '';

      const todayId = getTodayId();
      const dias = filter === 'all' ? agenda.dias : agenda.dias.filter(d => d.id === filter);

      dias.forEach(d => {
        const sec = document.createElement('div');
        sec.className = 'day-section';
        const isToday = d.id === todayId;
        const count = d.eventos.length;

        sec.innerHTML = `
          <div class="day-header">
            <div class="day-dot" style="${isToday ? 'animation: pulse 1.5s infinite;' : ''}"></div>
            <span class="day-label">${d.label}${isToday ? ' — hoje' : ''}</span>
            <div class="day-line"></div>
            <span class="day-count">${count > 0 ? count + (count === 1 ? ' lugar' : ' lugares') : ''}</span>
          </div>
        `;

        if (d.eventos.length === 0) {
          sec.innerHTML += `<p class="empty-day">Nenhuma agenda fixa disponível</p>`;
        } else {
          d.eventos.forEach(ev => {
            const icon = getIcon(ev.nome);
            const tag = ev.instagram ? 'a' : 'div';
            const attrs = ev.instagram ? `href="${ev.instagram}" target="_blank" rel="noopener"` : '';
            const noLink = ev.instagram ? '' : 'no-link';

            const igLink = ev.instagram ? `
              <div class="event-ig-link">
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
                  <circle cx="12" cy="12" r="4"/>
                  <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
                </svg>
                Instagram
              </div>` : '';

            sec.innerHTML += `
              <${tag} class="event-card ${noLink}" ${attrs}>
                <div class="event-icon">${icon}</div>
                <div class="event-info">
                  <p class="event-name">${ev.nome}</p>
                  <p class="event-meta">
                    <span>${ev.local}</span>
                    ${ev.bairro ? `<span class="event-meta-sep">·</span><span>${ev.bairro}</span>` : ''}
                  </p>
                </div>
                <div class="event-right">
                  ${ev.frequencia ? `<span class="event-badge">${ev.frequencia}</span>` : ''}
                  ${igLink}
                </div>
              </${tag}>
            `;
          });
        }

        container.appendChild(sec);
      });

      // Variáveis section
      if (filter === 'all' && agenda.variaveis && agenda.variaveis.length > 0) {
        const obsEl = document.createElement('div');
        obsEl.className = 'obs-section';
        obsEl.innerHTML = `
          <div class="obs-header">
            <span class="obs-header-icon">⚠️</span>
            <span class="obs-header-text">Lugares variáveis — checar programação antes de ir</span>
          </div>
          ${agenda.variaveis.map(v => `
            <div class="obs-item">
              <div>
                <p class="obs-name">${v.nome}</p>
                <p class="obs-bairro">${v.bairro}</p>
              </div>
              <span class="obs-days">${v.dias}</span>
            </div>
          `).join('')}
        `;
        container.appendChild(obsEl);
      }

      // Outros section
      if (filter === 'all' && agenda.outros && agenda.outros.length > 0) {
        const outrosEl = document.createElement('div');
        outrosEl.className = 'outros-section';
        outrosEl.innerHTML = `
          <p class="outros-title">Outros lugares que tocam forró</p>
          <div class="outros-chips">
            ${agenda.outros.map(o => `
              <span class="outros-chip">${o.nome} <span>· ${o.bairro}</span></span>
            `).join('')}
          </div>
        `;
        container.appendChild(outrosEl);
      }
    }

    // ── INIT ──
    async function init() {
      const todayId = getTodayId();
      const todayLabel = DIAS_LABELS[todayId] || '';
      document.getElementById('today-label').textContent = `Hoje é ${todayLabel}`;

      try {
        const res = await fetch('agenda.json');
        if (!res.ok) throw new Error('Erro ao carregar agenda');
        const agenda = await res.json();
        window._agenda = agenda;

        // update last update
        if (agenda.ultima_atualizacao) {
          document.getElementById('last-update').textContent = formatDate(agenda.ultima_atualizacao);
        }

        buildFilters(agenda.dias);
        renderContent(agenda, 'all');

      } catch (err) {
        document.getElementById('main-content').innerHTML = `
          <div class="loading">Erro ao carregar agenda. Tente novamente.</div>
        `;
        console.error(err);
      }
    }

    init();
  </script>
</body>
</html>
